<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AlleyPin 客服公告產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#E8EAEF;padding:20px;color:#2c3a4a;min-height:100vh}
h1{font-size:18px;font-weight:900;color:#1B4F9C;margin-bottom:18px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;max-width:1080px}
.panel{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.sec{font-size:11px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin:16px 0 10px;border-top:1px solid #f0f0f0;padding-top:12px}
.sec:first-child{margin-top:0;border-top:none;padding-top:0}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid #e0e0e0;font-family:inherit;font-size:13px;color:#2c3a4a;outline:none;background:#fafafa}
.field input:focus,.field select:focus{border-color:#1B4F9C}
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.tpl-btn{border:2px solid #e0e0e0;border-radius:10px;padding:10px 4px;cursor:pointer;text-align:center;background:#fafafa;color:#aaa}
.tpl-btn.active{border-color:#1B4F9C;background:#EBF3FA;color:#1B4F9C}
.tpl-icon{margin-bottom:4px;line-height:1}
.tpl-name{font-size:15px;font-weight:700;color:#666;line-height:1.3}
.day-rows{display:flex;flex-direction:column;gap:6px}
.day-row{display:grid;grid-template-columns:90px 1fr;gap:6px;align-items:center}
.day-row span{font-size:12px;font-weight:700;color:#555}
/* Template C card rows - fixed 2 slots */
.c-slot{background:#f8f8f8;border-radius:8px;padding:10px}
.c-slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.c-slot label{font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:3px}
.c-slot input,.c-slot select{width:100%;padding:7px 9px;border-radius:6px;border:1.5px solid #e0e0e0;font-family:inherit;font-size:13px;background:white}
.c-slots{display:flex;flex-direction:column;gap:8px}
.gen-btn{width:100%;padding:12px;background:#1B4F9C;color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px}
.gen-btn:hover{background:#154080}
.dl-btn{width:100%;padding:10px;border:2px solid #1B4F9C;color:#1B4F9C;background:transparent;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;display:none}
.dl-btn:hover{background:#1B4F9C;color:white}
.preview-wrap{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);position:sticky;top:20px}
.preview-label{font-size:11px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
#canvas-wrap{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#eee;display:flex;align-items:center;justify-content:center}
#canvas-wrap canvas{width:100%!important;height:100%!important;display:block}
.hint{color:#bbb;font-size:13px}
.note{font-size:11px;color:#aaa;margin-top:4px}
</style>
</head>
<body>
<h1>📢 AlleyPin 客服公告產生器</h1>
<div class="layout">
<div class="panel">
  <div class="sec">版型</div>
  <div class="tpl-grid">
    <div class="tpl-btn active" onclick="setTpl('A',this)">
      <div class="tpl-icon"><svg width="44" height="28" viewBox="0 0 44 28"><rect x="2" y="8" width="40" height="12" rx="4" fill="currentColor" opacity=".25"/><rect x="2" y="8" width="40" height="12" rx="4" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <div class="tpl-name">版型 A<br>週曆單列</div>
    </div>
    <div class="tpl-btn" onclick="setTpl('B',this)">
      <div class="tpl-icon"><svg width="44" height="28" viewBox="0 0 44 28"><rect x="2" y="2" width="40" height="10" rx="3" fill="currentColor" opacity=".25"/><rect x="2" y="2" width="40" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="2" y="16" width="40" height="10" rx="3" fill="currentColor" opacity=".25"/><rect x="2" y="16" width="40" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <div class="tpl-name">版型 B<br>週曆雙列</div>
    </div>
    <div class="tpl-btn" onclick="setTpl('C',this)">
      <div class="tpl-icon"><svg width="44" height="28" viewBox="0 0 44 28"><rect x="2" y="2" width="18" height="24" rx="3" fill="currentColor" opacity=".25"/><rect x="2" y="2" width="18" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="24" y="2" width="18" height="24" rx="3" fill="currentColor" opacity=".25"/><rect x="24" y="2" width="18" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <div class="tpl-name">版型 C<br>日期卡片</div>
    </div>
  </div>

  <div class="sec">背景圖</div>
  <div class="field"><label>選擇背景</label><select id="bg-select">
    <option value="other">其他</option>
    <option value="custom">自訂上傳</option>
  </select></div>
  <div style="font-size:12px;color:#555;line-height:1.6;margin:-4px 0 8px;padding:8px 10px;background:#fffbe6;border-radius:8px;border:1px solid #ffe58f">
    ⚠️ 請至 <a href="https://drive.google.com/drive/u/0/folders/1aRQNaXRjZs5z5apfpZ8LZVfP7jOjG2eT" target="_blank" style="color:#1B4F9C;font-weight:700">Google Drive</a> 下載使用，若有其他需求，請提早一週與設計部提出需求，感謝
  </div>
  <div id="bg-custom-wrap" class="field" style="display:none">
    <label>選擇圖片（PNG / JPG，建議 1040 px ×1040 px）</label>
    <input type="file" id="bg-custom-file" accept="image/png,image/jpeg" onchange="loadCustomBg(event)" style="padding:4px;font-size:12px">
  </div>

  <div class="sec">公告標題</div>
  <div id="title1-wrap" class="field"><label>第一行</label><input type="text" id="title1" value="五一勞動節"></div>
  <div id="title2-wrap" class="field"><label>第二行</label><input type="text" id="title2" value="客服暫停公告"></div>
  <p id="title-note" class="note" style="display:none">版型 B 僅顯示第一行標題</p>

  <!-- A/B -->
  <div id="ab-fields">
    <div class="sec">週曆設定</div>
    <div id="week-start-wrap"><div class="field"><label>週起始日（週日）</label><input type="date" id="week-start" value="2026-04-26"></div></div>
    <div id="a-day-fields"><div class="field"><label>各日狀態（7天）</label><div class="day-rows" id="day-rows"></div></div></div>
    <div id="b-date-fields" style="display:none">
      <div class="field"><label>暫停服務 開始</label><input type="date" id="b-closed-start" value="2026-04-30"></div>
      <div class="field"><label>暫停服務 結束</label><input type="date" id="b-closed-end" value="2026-05-04"></div>
      <div class="field"><label>正常值班</label><input type="date" id="b-open-date" value="2026-05-05"></div>
    </div>
  </div>

  <!-- C: fixed 2 slots, no add button -->
  <div id="c-fields" style="display:none">
    <div class="sec">日期卡片（固定 2 欄）</div>
    <div class="c-slots">
      <div class="c-slot">
        <div style="font-size:11px;font-weight:700;color:#1B4F9C;margin-bottom:8px">欄位 1</div>
        <div class="c-slot-grid">
          <div><label>日期</label><input type="date" id="c1-date" value="2026-03-12"></div>
          <div><label>狀態</label><select id="c1-type" onchange="toggleTime('c1')">
            <option value="closed">暫停服務</option><option value="open">正常值班</option></select></div>
        </div>
        <div id="c1-time-wrap"><label>時間（如 16:00～）</label><input type="text" id="c1-time" placeholder="16:00～"></div>
      </div>
      <div class="c-slot">
        <div style="font-size:11px;font-weight:700;color:#1B4F9C;margin-bottom:8px">欄位 2</div>
        <div class="c-slot-grid">
          <div><label>日期</label><input type="date" id="c2-date" value="2026-03-13"></div>
          <div><label>狀態</label><select id="c2-type" onchange="toggleTime('c2')">
            <option value="closed">暫停服務</option><option value="open" selected>正常值班</option></select></div>
        </div>
        <div id="c2-time-wrap" style="display:none"><label>時間（選填）</label><input type="text" id="c2-time" placeholder="16:00～"></div>
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">▶ 產生預覽</button>
  <button class="dl-btn" id="dl-btn" onclick="download()">⬇ 下載 PNG（1040px × 1040px）</button>
  <button class="dl-btn" id="dl-svg-btn" onclick="downloadSVG()" style="display:none">⬇ 下載 SVG（1040px × 1040px）</button>
</div>

<div class="preview-wrap">
  <div class="preview-label">預覽</div>
  <div id="canvas-wrap"><div class="hint">填入資訊後點擊「產生預覽」</div></div>
</div>
</div>

const DAYS_ZH=['日','一','二','三','四','五','六'];
const BF="'Noto Sans TC'";
let tpl='A';

function setTpl(t,el){
  tpl=t;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ab-fields').style.display=t!=='C'?'':'none';
  document.getElementById('c-fields').style.display=t==='C'?'':'none';
  // B: hide title2, show note
  document.getElementById('title2-wrap').style.display=t==='B'?'none':'';
  document.getElementById('title-note').style.display=t==='B'?'':'none';
  document.getElementById('a-day-fields').style.display=t==='A'?'':'none';
  document.getElementById('b-date-fields').style.display=t==='B'?'':'none';
  document.getElementById('week-start-wrap').style.display=t==='B'?'none':'';
  if(t==='A')buildDayRows();
}

function toggleTime(id){
  const sel=document.getElementById(id+'-type');
  document.getElementById(id+'-time-wrap').style.display=sel.value==='closed'?'':'none';
}

function buildDayRows(){
  const n=7;
  const ws=new Date(document.getElementById('week-start').value+'T00:00:00');
  const cont=document.getElementById('day-rows');
  const prev=Array.from(cont.querySelectorAll('select')).map(s=>s.value);
  cont.innerHTML='';
  for(let i=0;i<n;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const lbl=`${d.getMonth()+1}/${d.getDate()}（${DAYS_ZH[d.getDay()]}）`;
    const sel=prev[i]||'normal';
    const row=document.createElement('div');row.className='day-row';
    row.innerHTML=`<span>${lbl}</span><select>
      <option value="normal" ${sel==='normal'?'selected':''}>-</option>
      <option value="closed" ${sel==='closed'?'selected':''}>暫停服務</option>
      <option value="open"   ${sel==='open'?'selected':''}>正常值班</option></select>`;
    cont.appendChild(row);
  }
}
// ── 日期工具：避免 toISOString() 時區偏移問題 ──
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(dateStr,n){const[y,m,day]=dateStr.split('-').map(Number);return localDateStr(new Date(y,m-1,day+n));}

document.getElementById('week-start').addEventListener('change',function(){
  const d=new Date(this.value+'T00:00:00'),dow=d.getDay();
  if(dow!==0){d.setDate(d.getDate()-dow);this.value=localDateStr(d);}
  buildDayRows();
});
buildDayRows();

// ── Canvas helpers ──
function circ(ctx,cx,cy,r,f){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=f;ctx.fill();}
function rrect(ctx,x,y,w,h,r,f){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fillStyle=f;ctx.fill();
}
function sf(ctx,sz,wt,cl){ctx.font=`${wt} ${sz}px ${BF}`;ctx.fillStyle=cl;}
function drawColoredTitle(ctx,text,x,sz){
  // Color up to and including 節 with #0059a9, rest with #1B4F9C
  const nodeIdx=text.indexOf('節');
  if(nodeIdx<0){
    sf(ctx,sz,'900','#1B4F9C');ctx.textAlign='center';ctx.fillText(text,x,0);
    return;
  }
  const part1=text.slice(0,nodeIdx+1),part2=text.slice(nodeIdx+1);
  sf(ctx,sz,'900','#0059a9');
  const w1=ctx.measureText(part1).width;
  sf(ctx,sz,'900','#1B4F9C');
  const w2=ctx.measureText(part2).width;
  const totalW=w1+w2;
  const startX=x-totalW/2;
  sf(ctx,sz,'900','#0059a9');ctx.textAlign='left';ctx.fillText(part1,startX,0);
  if(part2){sf(ctx,sz,'900','#1B4F9C');ctx.textAlign='left';ctx.fillText(part2,startX+w1,0);}
  ctx.textAlign='center';
}
function loadImg(src){return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=src;});}
function svgImg(paths,W){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1040" width="${W}" height="${W}">${paths}</svg>`;
  const url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));
  return loadImg(url).then(img=>{URL.revokeObjectURL(url);return img;});
}
async function drawBg(ctx,W){
  const sel=document.getElementById('bg-select').value;
  let src;
  if(sel==='custom') src=customBgData;
  else src='data:image/png;base64,'+BG_OTHER;
  if(!src)return;
  const img=await loadImg(src);
  if(img)ctx.drawImage(img,0,0,W,W);
}

// ── Template A: single-row ──
function drawA(ctx,ws,st){
  const C=[127,258,389,520,651,782,913];
  rrect(ctx,62,354,916,305,22,'white');
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  DAYS_ZH.forEach((d,i)=>{sf(ctx,38,'900',(i===0||i===6)?'#1B4F9C':'#555555');ctx.fillText(d,C[i],432);});
  ctx.beginPath();ctx.moveTo(82,460);ctx.lineTo(958,460);ctx.strokeStyle='#D0D0D0';ctx.lineWidth=1.5;ctx.stroke();
  const DCY=531,PY=543,LY=614,CR=38;
  // Pre-draw closed groups: single→circle, consecutive→pill
  const closedGrps=[];let gi=-1,prev=false;
  for(let i=0;i<7;i++){const s=st[i]||'normal';if(s==='closed'){if(!prev){closedGrps.push([i]);gi++;}else closedGrps[gi].push(i);prev=true;}else prev=false;}
  closedGrps.forEach(grp=>{
    if(grp.length===1){circ(ctx,C[grp[0]],DCY,CR,'#888888');}
    else{const x1=C[grp[0]]-CR,x2=C[grp[grp.length-1]]+CR;rrect(ctx,x1,DCY-CR,x2-x1,CR*2,CR,'#888888');}
    const midX=(C[grp[0]]+C[grp[grp.length-1]])/2;
    ctx.textBaseline='alphabetic';sf(ctx,27,'400','#888888');ctx.textAlign='center';ctx.fillText('暫停服務',midX,LY);
  });
  // Draw numbers
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const s=st[i]||'normal',cx=C[i];
    const isNew=d.getDate()===1;
    const num=isNew?`${d.getMonth()+1}/${d.getDate()}`:String(d.getDate());
    const numFs=isNew?36:34.52;
    if(s==='hide')continue;
    if(s==='closed'){
      ctx.textBaseline='middle';sf(ctx,numFs,'900','white');ctx.textAlign='center';ctx.fillText(num,cx,DCY);ctx.textBaseline='alphabetic';
    }else if(s==='open'){
      circ(ctx,cx,DCY,CR,'#E8A020');
      ctx.textBaseline='middle';sf(ctx,numFs,'900','white');ctx.textAlign='center';ctx.fillText(num,cx,DCY);
      ctx.textBaseline='alphabetic';sf(ctx,27,'400','#E8A020');ctx.fillText('正常值班',cx,LY);
    }else{
      ctx.textBaseline='alphabetic';sf(ctx,numFs,'900',(i===0||i===6)?'#1B4F9C':'#333333');
      ctx.textAlign='center';ctx.fillText(num,cx,PY);
    }
  }
}

// Title: one line only, +20px down vs A (A title y1=172, B title y1=192+20=212)

function drawBTitle(ctx,t1){

function drawB(ctx,ws,st){
  const C=[127,258,389,520,651,782,913];
  // Card top 278 (moved up 20px from 298)
  rrect(ctx,62,278,916,412,22,'white');
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  DAYS_ZH.forEach((d,i)=>{sf(ctx,38,'900',(i===0||i===6)?'#1B4F9C':'#555555');ctx.fillText(d,C[i],346);});
  ctx.beginPath();ctx.moveTo(82,372);ctx.lineTo(958,372);ctx.strokeStyle='#D0D0D0';ctx.lineWidth=1.5;ctx.stroke();

  // Row config — moved up 20px
  const rows=[
    {baseY:427, plainY:438, labelY:504},
    {baseY:577, plainY:588, labelY:654},
  ];

  for(let row=0;row<2;row++){
    const {baseY,plainY,labelY}=rows[row];
    const CR=34;
    const closedIdx=[];
    for(let i=0;i<7;i++){if(st[row*7+i]==='closed')closedIdx.push(i);}

    // Task 1: single closed date → circle; Task 2: pill height=diameter, radius=100%
    if(closedIdx.length===1){
      // Single: draw circle
      circ(ctx,C[closedIdx[0]],baseY,CR,'#888888');
    }else if(closedIdx.length>1){
      // Multiple: pill height=2*CR, radius=CR (100%), span exact circle edges
      const x1=C[closedIdx[0]]-CR-4,x2=C[closedIdx[closedIdx.length-1]]+CR+4;
      rrect(ctx,x1,baseY-CR,x2-x1,CR*2,CR,'#888888');
    }

    for(let i=0;i<7;i++){
      const idx=row*7+i;
      const d=new Date(ws);d.setDate(d.getDate()+idx);
      const s=st[idx]||'normal',cx=C[i];
      if(s==='hide')continue;
      const isNew=d.getDate()===1;
      const numStr=isNew?`${d.getMonth()+1}/${d.getDate()}`:String(d.getDate());
      const numFs=isNew?36:34.52;

      if(s==='closed'){
        ctx.textBaseline='middle';sf(ctx,numFs,'900','white');ctx.textAlign='center';ctx.fillText(numStr,cx,baseY);ctx.textBaseline='alphabetic';
      }else if(s==='open'){
        circ(ctx,cx,baseY,CR,'#E8A020');
        ctx.textBaseline='middle';sf(ctx,numFs,'900','white');ctx.textAlign='center';ctx.fillText(numStr,cx,baseY);ctx.textBaseline='alphabetic';
        sf(ctx,27,'400','#E8A020');ctx.textAlign='center';ctx.fillText('正常值班',cx,labelY);
      }else{
        ctx.textBaseline='alphabetic';sf(ctx,numFs,'900',(i===0||i===6)?'#1B4F9C':'#333333');
        ctx.textAlign='center';ctx.fillText(numStr,cx,plainY);
      }
    }
    if(closedIdx.length>0){
      // Task 1: for row 1 (row===1) if the only closed day is Sunday (i===0), skip label
      const firstClosed=closedIdx[0];
      const skipLabel=row===1 && closedIdx.length===1 && firstClosed===0;
      if(!skipLabel){
        const midX=(C[closedIdx[0]]+C[closedIdx[closedIdx.length-1]])/2;
        ctx.textBaseline='alphabetic';sf(ctx,27,'400','#888888');ctx.textAlign='center';ctx.fillText('暫停服務',midX,labelY);
      }
    }
    if(row===0){ctx.beginPath();ctx.moveTo(82,535);ctx.lineTo(958,535);ctx.strokeStyle='#E8E8E8';ctx.lineWidth=1;ctx.stroke();}
  }
}

// ── Template C ──
// Date+dow +20px down: date was CY+108 → CY+128, badge was CY+78 → CY+98
// Badge +35px right total (was +44, now +79 from cx offset)
// Badge colour: closed=#1B4F9C, open=#4CAF72 (fixed)
function drawC(ctx,cards){
  // 每欄356px, 高400px (原420-20), CY=310
  const CX=164,CY=330,CW=712,CH=374,HALF=356;
  rrect(ctx,CX,CY,CW,CH,22,'white');
  const DOT_Y=CY+204;
  ctx.save();ctx.setLineDash([8,5]);
  ctx.beginPath();ctx.moveTo(CX+20,DOT_Y);ctx.lineTo(CX+CW-20,DOT_Y);
  ctx.strokeStyle='#CCCCCC';ctx.lineWidth=2;ctx.stroke();ctx.restore();

  cards.forEach((card,i)=>{
    const cx=CX+HALF*(i+0.5);
    const d=card.date?new Date(card.date+'T00:00:00'):null;
    if(!d)return;
    const mo=d.getMonth()+1,da=d.getDate(),dow=DAYS_ZH[d.getDay()];
    const isOpen=card.type==='open';
    const dotCol=isOpen?'#4CAF72':'#888888';
    const badgeCol='#1B4F9C';

    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    sf(ctx,72,'900','#1B4F9C');
    const twoDigit=mo>=10;
    const dateX=cx-15-(i===1&&twoDigit?16:0);
    ctx.fillText(`${mo}/${da}`,dateX,CY+128);

    const bw=46,bh=38,bx=(cx+44+35)+(i===0&&twoDigit?12:0),by=CY+94;
    rrect(ctx,bx,by,bw,bh,8,badgeCol);
    ctx.textBaseline='middle';sf(ctx,20,'700','white');ctx.textAlign='center';
    ctx.fillText(dow,bx+bw/2,by+bh/2);
    ctx.textBaseline='alphabetic';

    circ(ctx,cx,DOT_Y,10,dotCol);

    ctx.textAlign='center';
    if(isOpen){
      sf(ctx,47,'900','#4CAF72');ctx.fillText('正常值班',cx,CY+295);
    }else{
      // Break at ~ or ～
      const timeStr=card.time||'';
      const hasBreak=timeStr.includes('~')||timeStr.includes('～');
      sf(ctx,47,'900','#888888');
      if(timeStr&&hasBreak){
        ctx.fillText(timeStr,cx,CY+270);
        ctx.fillText('暫停服務',cx,CY+330);
      }else{
        const txt=timeStr?timeStr+'暫停服務':'暫停服務';
        ctx.fillText(txt,cx,CY+295);
      }
    }
  });
}

// ── Generate ──
async function generate(){
  await document.fonts.ready;
  const W=1040;
  const wrap=document.getElementById('canvas-wrap');
  wrap.innerHTML='';
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=W;
  wrap.appendChild(canvas);
  const ctx=canvas.getContext('2d');

  const t1=document.getElementById('title1').value||'';
  const t2=document.getElementById('title2').value||'';
  let ws;
  if(tpl==='B'){
    const csEl2=document.getElementById('b-closed-start');
    if(csEl2&&csEl2.value){const _d=new Date(csEl2.value+'T00:00:00'),_dow=_d.getDay();if(_dow!==0)_d.setDate(_d.getDate()-_dow);ws=_d;}
    else ws=new Date(document.getElementById('week-start').value+'T00:00:00');
  }else{
    ws=new Date(document.getElementById('week-start').value+'T00:00:00');
  }
  const statuses=Array.from(document.querySelectorAll('#day-rows select')).map(s=>s.value);

  await drawBg(ctx,W);

  // All BGs include the illustration — no mascot SVG overlay needed

  // Title: A+10px, B+10px more (202), C unchanged (172)
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  if(tpl==='B'){
    ctx.save();ctx.translate(0,217);
    drawColoredTitle(ctx,t1,520,91.64);
    ctx.restore();
  }else{
    const fs=tpl==='C'?90:91.64;
    const y1=tpl==='A'?192:172;
    const y2=y1+fs*1.25;
    ctx.save();ctx.translate(0,y1);
    drawColoredTitle(ctx,t1,520,fs);
    ctx.restore();
    if(t2){
      ctx.save();ctx.translate(0,y2);
      drawColoredTitle(ctx,t2,520,fs);
      ctx.restore();
    }
  }

  if(tpl==='A'){
    drawA(ctx,ws,statuses);
  }else if(tpl==='B'){
    const csEl=document.getElementById('b-closed-start');
    const ceEl=document.getElementById('b-closed-end');
    const opEl=document.getElementById('b-open-date');
    const csTime=csEl&&csEl.value?new Date(csEl.value+'T00:00:00').getTime():null;
    const ceTime=ceEl&&ceEl.value?new Date(ceEl.value+'T00:00:00').getTime():null;
    const opTime=opEl&&opEl.value?new Date(opEl.value+'T00:00:00').getTime():null;
    const st14=[];
    for(let i=0;i<14;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const t=d.getTime();if(csTime&&ceTime&&t>=csTime&&t<=ceTime)st14.push('closed');else if(opTime&&t===opTime)st14.push('open');else st14.push('normal');}
    drawB(ctx,ws,st14);
    window._bParams={ws,csTime,ceTime,opTime};
  }else{
    const cards=[
      {date:document.getElementById('c1-date').value, type:document.getElementById('c1-type').value, time:document.getElementById('c1-time').value},
      {date:document.getElementById('c2-date').value, type:document.getElementById('c2-type').value, time:document.getElementById('c2-time').value},
    ];
    drawC(ctx,cards);
  }

  document.getElementById('dl-btn').style.display='block';
  document.getElementById('dl-svg-btn').style.display='block';
  window._cvs=canvas;
  // Store params for editable SVG
  const bCards=tpl==='C'?[{date:document.getElementById('c1-date').value,type:document.getElementById('c1-type').value,time:document.getElementById('c1-time').value},{date:document.getElementById('c2-date').value,type:document.getElementById('c2-type').value,time:document.getElementById('c2-time').value}]:[];
  const bp=window._bParams||{};
  window._lastParams={tplX:tpl,t1,t2,ws,statuses,cards:bCards,csTime:bp.csTime||null,ceTime:bp.ceTime||null,opTime:bp.opTime||null};
}

function download(){
  if(!window._cvs)return;
  const t1=document.getElementById('title1').value||'';
  const fname=`[社群貼文] - ${t1}客服暫停公告.png`;
  const a=document.createElement('a');a.download=fname;
  a.href=window._cvs.toDataURL('image/png');a.click();
}
// ── SVG helpers ──
function escSV(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function svgRr(x,y,w,h,r,f){return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${f}"/>`;}
function svgCi(cx,cy,r,f){return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${f}"/>`;}
function svgTxt(txt,x,y,fs,fw,fill,anchor,central){
  const db=central?'dy="0.36em"':'';
  return `<text x="${x}" y="${y}" font-size="${fs}" font-weight="${fw}" fill="${fill}" text-anchor="${anchor||'middle'}" ${db} font-family="'Noto Sans TC',sans-serif">${escSV(txt)}</text>`;
}
function svgTitle(txt,x,y,fs){
  const idx=txt.indexOf('節');
  if(idx<0)return svgTxt(txt,x,y,fs,'900','#1B4F9C');
  const p1=escSV(txt.slice(0,idx+1)),p2=escSV(txt.slice(idx+1));
  return `<text x="${x}" y="${y}" font-size="${fs}" font-weight="900" text-anchor="middle" font-family="'Noto Sans TC',sans-serif"><tspan fill="#0059a9">${p1}</tspan><tspan fill="#1B4F9C">${p2}</tspan></text>`;
}

  s+=svgRr(CX,CY,CW,CH,22,'white');
  const DOT_Y=CY+204;
  s+=`<line x1="${CX+20}" y1="${DOT_Y}" x2="${CX+CW-20}" y2="${DOT_Y}" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 5"/>`;
  cards.forEach((card,i)=>{
    const cx=CX+HALF*(i+0.5),d=card.date?new Date(card.date+'T00:00:00'):null;if(!d)return;
    const mo=d.getMonth()+1,da=d.getDate(),dow=DAYS_ZH[d.getDay()],isOpen=card.type==='open';
    const twoDigit=mo>=10;
    s+=svgTxt(`${mo}/${da}`,cx-15-(i===1&&twoDigit?16:0),CY+128,72,'900','#1B4F9C');
    const bw=46,bh=38,bx=cx+79+(i===0&&twoDigit?12:0),by=CY+94;
    s+=svgRr(bx,by,bw,bh,8,'#1B4F9C');
    s+=svgTxt(dow,bx+bw/2,by+bh/2,20,'700','white','middle',true);
    s+=svgCi(cx,DOT_Y,10,isOpen?'#4CAF72':'#888888');
    const timeStr=card.time||'',hasBreak=timeStr.includes('~')||timeStr.includes('～');
    if(isOpen)s+=svgTxt('正常值班',cx,CY+295,47,'900','#4CAF72');
    else if(timeStr&&hasBreak){s+=svgTxt(timeStr,cx,CY+270,47,'900','#888888');s+=svgTxt('暫停服務',cx,CY+330,47,'900','#888888');}
    else s+=svgTxt(timeStr?timeStr+'暫停服務':'暫停服務',cx,CY+295,47,'900','#888888');
  });
  return s;
}
async function downloadSVG(){
  const lp=window._lastParams;if(!lp)return;
  const bgSel=document.getElementById('bg-select').value;
  let bgSrc;
  bgSrc=bgSel==='custom'?customBgData:'data:image/png;base64,'+BG_OTHER;
  let body=`<image width="1040" height="1040" xlink:href="${bgSrc}" href="${bgSrc}"/>`;
  if(lp.tplX==='A')body+=svgA_gen(lp.ws,lp.statuses,lp.t1,lp.t2);
  else if(lp.tplX==='B')body+=svgB_gen(lp.ws,lp.csTime,lp.ceTime,lp.opTime,lp.t1);
  else body+=svgC_gen(lp.cards,lp.t1,lp.t2);
  const defs='<defs><style><![CDATA[@import url(\'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap\');]]></style></defs>';
  const svgStr='<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1040" height="1040" viewBox="0 0 1040 1040">'+defs+body+'</svg>';
  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const fname=`[社群貼文] - ${lp.t1||''}客服暫停公告.svg`;
  const a=document.createElement('a');a.download=fname;
  a.href=url;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
let customBgData=null;
function loadCustomBg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{customBgData=ev.target.result;};r.readAsDataURL(file);
}
document.getElementById('bg-select').addEventListener('change',function(){
  document.getElementById('bg-custom-wrap').style.display=this.value==='custom'?'':'none';
});
// ── 版型B：開始 → 結束(+1)；結束 → 值班(+1) ──
document.getElementById('b-closed-start').addEventListener('change',function(){
  if(!this.value)return;
  const endVal=addDays(this.value,1);
  document.getElementById('b-closed-end').value=endVal;
  document.getElementById('b-open-date').value=addDays(endVal,1);
});
document.getElementById('b-closed-end').addEventListener('change',function(){
  if(!this.value)return;
  document.getElementById('b-open-date').value=addDays(this.value,1);
});
// ── 版型C：欄位1 日期 → 欄位2(+1) ──
document.getElementById('c1-date').addEventListener('change',function(){
  if(!this.value)return;
  document.getElementById('c2-date').value=addDays(this.value,1);
});
</script>
